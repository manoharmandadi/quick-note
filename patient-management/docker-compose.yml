version: '3.8'
name: patient-management
networks:
  patientmng_net:
volumes:
  auth-service-db-data:
  postgres-data:
services:
  # PostgreSQL
  auth-service-db:
    image: postgres:14.20
    container_name: auth-service-db
    environment:
      POSTGRES_DB: auth-service-db
      POSTGRES_USER: admin_user
      POSTGRES_PASSWORD: password
    volumes:
      - auth-service-db-data:/var/lib/postgresql/data
#      - D:\_learning\_docker\db_volume\auth-service-db:/var/lib/postgresql/data
    ports:
      - "5001:5432"
    networks:
      - patientmng_net
  auth-service:
    build: ./auth-service
    container_name: auth-service
    environment:
      SPRING_DATASOURCE_PASSWORD: password
      SPRING_DATASOURCE_URL: jdbc:postgresql://auth-service-db:5432/auth-service-db
      SPRING_DATASOURCE_USERNAME: admin_user
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_SQL_INIT_MODE: always
      JWT_SECRET: sW/VHiNWXwiPmYKegWQMvm4T/baNYNzHI1NTttExqTg=
#    ports:
#      - "4005:4005"
    networks:
      - patientmng_net
    depends_on:
      - auth-service-db

  #Billing Service
  billing-service:
    build: ./billing-service
    container_name: billing-service
    ports:
      - "4001:4001"
      - "9001:9001"
    networks:
      - patientmng_net
  analytics-service:
    build: ./analytics-service
    container_name: analytics-service
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    ports:
      - "4002:4002"
    networks:
      - patientmng_net
    depends_on:
      - kafka
  # PostgreSQL
  patient-service-db:
    image: postgres:14.20
    container_name: patient-service-db
    environment:
      POSTGRES_DB: patient-service-db
      POSTGRES_USER: admin_user
      POSTGRES_PASSWORD: password
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
#    healthcheck:
#      test: [ "CMD-SHELL", "pg_isready -U patient -d patient" ]
#      interval: 1s
#      timeout: 5s
#      retries: 5
    networks:
      - patientmng_net

    # Patient Service
  patient-service:
    build: ./patient-service
    container_name: patient-service
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://patient-service-db:5432/patient-service-db
      SPRING_DATASOURCE_USERNAME: admin_user
      SPRING_DATASOURCE_PASSWORD: password
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      BILLING_SERVICE_ADDRESS: billing-service
      BILLING_SERVICE_GRPC_PORT: 9001
#    ports:
#      - "4000:4000"
    depends_on:
      - patient-service-db
      - billing-service
      - kafka
    networks:
      - patientmng_net
  kafka:
    image: apache/kafka:4.1.2
    container_name: kafka
    environment:
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 0@kafka:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094
      KAFKA_NODE_ID: 0
      KAFKA_PROCESS_ROLES: controller,broker
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
#  -e KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1 \
#  -e KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1 \
#-e KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS=0 \
    ports:
        - "9092:9092"
        - "9094:9094"
    networks:
      - patientmng_net
  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    environment:
      AUTH_SERVICE_URL: http://auth-service:4005
    ports:
      - "4004:4004"
    depends_on:
      - patient-service
      - billing-service
      - analytics-service
    networks:
      - patientmng_net